# 임베딩 동기화와 검색의 기본 설정입니다.
# 명령행 옵션을 함께 지정하면 해당 옵션이 이 파일의 값보다 우선합니다.
chunk_dir: chunk
db_path: vector_store/rag.sqlite3
model_dir: .models/bge-m3
model_id: BAAI/bge-m3
batch_size: 16
# CPU만 사용할 때는 cpu, NVIDIA GPU는 cuda 또는 cuda:0을 지정합니다.
# null이면 sentence-transformers가 장치를 자동 선택합니다.
device: null
# tqdm은 터미널용 동적 막대, log는 배치마다 줄을 flush해 Kaggle 로그 프리뷰에 적합합니다.
progress: tqdm
# hybrid 검색은 dense로 후보를 먼저 추린 뒤, 그 후보만 sparse 점수로 재정렬합니다.
# 후보 수를 키우면 재현율은 높아지지만 검색 시간이 늘어납니다.
hybrid_dense_candidates: 200
# 점수 범위를 각각 0~1로 정규화한 후 아래 가중치로 결합합니다.
hybrid_dense_weight: 0.5
hybrid_sparse_weight: 0.5
